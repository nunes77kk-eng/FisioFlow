<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tratamentos — FisioFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/painel.css" />
  <link rel="icon" href="../img/logo.svg" type="image/svg+xml" />
</head>
<body data-pagina="tratamentos" data-titulo="Tratamentos" data-subtitulo="Serviços oferecidos pela clínica">
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <div class="main">
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:14px">
          <button class="hamburguer" id="hamburguer" aria-label="Menu"><span></span><span></span><span></span></button>
          <div><h1 id="pageTitle"></h1><div class="subtitle" id="pageSubtitle"></div></div>
        </div>
        <div class="topbar-right" id="topbarRight"></div>
      </header>

      <main class="content">
        <div class="toolbar">
          <div class="search-box">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" class="input" id="busca" placeholder="Buscar tratamento..." />
          </div>
          <div class="toolbar-spacer"></div>
          <button class="btn btn-primary" id="btnNovo">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>
            Novo tratamento
          </button>
        </div>

        <div class="table-wrap">
          <div class="table-scroll">
            <table class="data">
              <thead>
                <tr><th>Nome</th><th>Descrição</th><th>Duração</th><th>Valor</th><th style="text-align:right">Ações</th></tr>
              </thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>
        </div>
        <div class="pagination" id="paginacao"></div>
      </main>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-box">
      <div class="modal-head">
        <h3 id="modalTitulo">Novo tratamento</h3>
        <button class="modal-close" data-fechar><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      </div>
      <form id="form">
        <div class="modal-body">
          <input type="hidden" id="f-id" />
          <div class="field">
            <label for="f-nome">Nome <span class="req">*</span></label>
            <input type="text" id="f-nome" class="input" />
            <div class="field-error">Informe o nome (mín. 3 caracteres).</div>
          </div>
          <div class="field">
            <label for="f-desc">Descrição</label>
            <textarea id="f-desc" class="textarea" maxlength="255"></textarea>
          </div>
          <div class="form-row">
            <div class="field">
              <label for="f-dur">Duração (minutos) <span class="req">*</span></label>
              <input type="number" id="f-dur" class="input" min="1" value="60" />
              <div class="field-error">Duração deve ser positiva.</div>
            </div>
            <div class="field">
              <label for="f-valor">Valor (R$) <span class="req">*</span></label>
              <input type="number" id="f-valor" class="input" min="0" step="0.01" value="0.00" />
              <div class="field-error">Valor inválido.</div>
            </div>
          </div>
        </div>
        <div class="modal-foot">
          <button type="button" class="btn btn-ghost" data-fechar>Cancelar</button>
          <button type="submit" class="btn btn-primary" id="btnSalvar">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/tratamentos.js"></script>
</body>
</html>
